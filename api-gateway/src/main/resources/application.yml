server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: match-service
          uri: http://localhost:8081
          predicates:
            - Path=/matches/**
          filters:
            - RewritePath=/matches/(?<remaining>.*), /api/matches/${remaining}

        - id: league-service
          uri: http://localhost:8082
          predicates:
            - Path=/leagues/**
          filters:
            - RewritePath=/leagues/(?<remaining>.*), /api/leagues/${remaining}

        - id: team-service
          uri: http://localhost:8083
          predicates:
            - Path=/teams/**
          filters:
            - RewritePath=/teams/(?<remaining>.*), /api/teams/${remaining}

        - id: stadium-service
          uri: http://localhost:8084
          predicates:
            - Path=/stadiums/**
          filters:
            - RewritePath=/stadiums/(?<remaining>.*), /api/stadiums/${remaining}

# Also keep previous /api/* mappings for compatibility (optional)
        - id: match-service-api
          uri: http://localhost:8081
          predicates:
            - Path=/api/matches/**
        - id: league-service-api
          uri: http://localhost:8082
          predicates:
            - Path=/api/leagues/**
        - id: team-service-api
          uri: http://localhost:8083
          predicates:
            - Path=/api/teams/**
        - id: stadium-service-api
          uri: http://localhost:8084
          predicates:
            - Path=/api/stadiums/**

# springdoc OpenAPI settings
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
