server:
  port: 8080

spring:
  profiles:
    active: local
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: match-service
          uri: ${services.match.url}
          predicates:
            - Path=/matches,/matches/**
          filters:
            - RewritePath=/matches(?<remaining>/?.*), /api/matches${remaining}

        - id: league-service
          uri: ${services.league.url}
          predicates:
            - Path=/leagues,/leagues/**
          filters:
            - RewritePath=/leagues(?<remaining>/?.*), /api/leagues${remaining}

        - id: team-service
          uri: ${services.team.url}
          predicates:
            - Path=/teams,/teams/**
          filters:
            - RewritePath=/teams(?<remaining>/?.*), /api/teams${remaining}

        - id: stadium-service
          uri: ${services.stadium.url}
          predicates:
            - Path=/stadiums,/stadiums/**
          filters:
            - RewritePath=/stadiums(?<remaining>/?.*), /api/stadiums${remaining}

# Also keep previous /api/* mappings for compatibility (optional)
        - id: match-service-api
          uri: ${services.match.url}
          predicates:
            - Path=/api/matches,/api/matches/**
        - id: league-service-api
          uri: ${services.league.url}
          predicates:
            - Path=/api/leagues,/api/leagues/**
        - id: team-service-api
          uri: ${services.team.url}
          predicates:
            - Path=/api/teams,/api/teams/**
        - id: stadium-service-api
          uri: ${services.stadium.url}
          predicates:
            - Path=/api/stadiums,/api/stadiums/**

services:
  match:
    url: http://localhost:8081
  league:
    url: http://localhost:8082
  team:
    url: http://localhost:8083
  stadium:
    url: http://localhost:8084

# springdoc OpenAPI settings
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Removed API tokens for local development; gateways do not require external API keys

---
spring:
  config:
    activate:
      on-profile: docker

services:
  match:
    url: http://match-service:8081
  league:
    url: http://league-service:8082
  team:
    url: http://team-service:8083
  stadium:
    url: http://stadium-service:8084
