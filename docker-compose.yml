services:
  postgres:
    image: postgres:16
    container_name: soccer-postgres
    environment:
      POSTGRES_DB: soccerdb
      POSTGRES_USER: soccer
      POSTGRES_PASSWORD: soccer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: soccer-app
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      FOOTBALL_DATA_API_TOKEN: ${FOOTBALL_DATA_API_TOKEN}
      API_FOOTBALL_API_KEY: ${API_FOOTBALL_API_KEY}
    ports:
      - "8080:8080"

volumes:
  postgres_data: