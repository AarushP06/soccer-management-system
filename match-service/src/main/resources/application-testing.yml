spring:
  datasource:
    url: jdbc:h2:mem:matchdb-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: false

services:
  league:
    url: http://localhost:8082
  team:
    url: http://localhost:8083
  stadium:
    url: http://localhost:8084
